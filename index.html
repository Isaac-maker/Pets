<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Care Vocabulary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #f0eef8;
    --surface: #ffffff;
    --purple-light: #e8e3f8;
    --purple-mid: #b8a9e8;
    --purple-dark: #6b53c4;
    --accent: #5bbfa0;
    --accent-dark: #3a9e82;
    --text: #2d2640;
    --text-soft: #7a6f9a;
    --verbs: #6b53c4;
    --nouns: #3a7fbf;
    --adverbs: #5bbfa0;
    --playing: #f0a030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--purple-dark);
    color: white;
    padding: 28px 24px 22px;
    text-align: center;
  }

  header h1 {
    font-size: 1.9rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  header p {
    font-size: 0.9rem;
    opacity: 0.8;
    margin-top: 6px;
  }

  .emoji-top { font-size: 2rem; margin-bottom: 8px; }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 20px 16px 0;
    flex-wrap: wrap;
  }

  .tab {
    padding: 8px 20px;
    border-radius: 999px;
    border: 2px solid transparent;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    color: var(--text-soft);
  }

  .tab.active-verbs, .tab[data-cat="verbs"]:hover { background: var(--verbs); color: white; border-color: var(--verbs); }
  .tab.active-nouns, .tab[data-cat="nouns"]:hover { background: var(--nouns); color: white; border-color: var(--nouns); }
  .tab.active-adverbs, .tab[data-cat="adverbs"]:hover { background: var(--adverbs); color: white; border-color: var(--adverbs); }
  .tab.active-all, .tab[data-cat="all"]:hover { background: var(--purple-dark); color: white; border-color: var(--purple-dark); }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 16px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 9px 20px;
    border-radius: 10px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-play-all {
    background: var(--accent);
    color: white;
  }
  .btn-play-all:hover { background: var(--accent-dark); }

  .btn-stop {
    background: #e05050;
    color: white;
    display: none;
  }
  .btn-stop:hover { background: #c03030; }

  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-soft);
  }

  .speed-wrap select {
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    color: var(--purple-dark);
    background: transparent;
    cursor: pointer;
    font-size: 0.88rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
    padding: 0 16px 40px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .section-label {
    grid-column: 1 / -1;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 4px 4px;
    border-bottom: 2px solid currentColor;
    margin-bottom: 4px;
  }

  .label-verbs { color: var(--verbs); }
  .label-nouns { color: var(--nouns); }
  .label-adverbs { color: var(--adverbs); }

  .card {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 14px 12px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border-top: 3px solid var(--purple-light);
    position: relative;
    user-select: none;
  }

  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(107,83,196,0.15); }
  .card:active { transform: scale(0.97); }

  .card.cat-verbs { border-color: var(--verbs); }
  .card.cat-nouns { border-color: var(--nouns); }
  .card.cat-adverbs { border-color: var(--adverbs); }

  .card.playing {
    background: #fff8e8;
    border-color: var(--playing);
    box-shadow: 0 0 0 3px rgba(240,160,48,0.25);
  }

  .card-en {
    font-weight: 800;
    font-size: 1rem;
    color: var(--text);
  }

  .card-es {
    font-size: 0.8rem;
    color: var(--text-soft);
    margin-top: 4px;
  }

  .card-icon {
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 1.1rem;
    opacity: 0.25;
    transition: opacity 0.2s;
  }

  .card:hover .card-icon, .card.playing .card-icon {
    opacity: 1;
  }

  .card.playing .card-icon { animation: pulse 0.6s infinite alternate; }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.3); }
  }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    header h1 { font-size: 1.5rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 9px; padding: 0 10px 30px; }
  }
</style>
</head>
<body>

<header>
  <div class="emoji-top">🐾</div>
  <h1>Pet Care Vocabulary</h1>
  <p>Tap any word to hear its pronunciation</p>
</header>

<div class="tabs">
  <button class="tab active-all" data-cat="all" onclick="filterCat('all', this)">All words</button>
  <button class="tab" data-cat="verbs" onclick="filterCat('verbs', this)">Verbs</button>
  <button class="tab" data-cat="nouns" onclick="filterCat('nouns', this)">Nouns</button>
  <button class="tab" data-cat="adverbs" onclick="filterCat('adverbs', this)">Adj & Adv</button>
</div>

<div class="controls">
  <button class="btn btn-play-all" id="btnPlayAll" onclick="playAll()">▶ Play all</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopAll()">■ Stop</button>
  <div class="speed-wrap">
    🐢 Speed:
    <select id="speedSelect">
      <option value="0.6">Slow</option>
      <option value="0.85" selected>Normal</option>
      <option value="1.1">Fast</option>
    </select>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const vocab = {
  verbs: [
    ["to adjust","ajustar"],
    ["to administer","administrar"],
    ["to adopt","adoptar"],
    ["to brush","cepillar"],
    ["to consult","consultar"],
    ["to display","mostrar"],
    ["to examine","examinar"],
    ["to groom","acicalar / arreglar"],
    ["to interact","interactuar"],
    ["to monitor","monitorear"],
    ["to nurture","nutrir / cuidar"],
    ["to perch","posarse"],
    ["to register","registrar"],
    ["to supervise","supervisar"],
    ["to vocalize","vocalizar"],
  ],
  nouns: [
    ["birdcage","jaula para pájaros"],
    ["client","cliente"],
    ["carrier","transportador"],
    ["groomer","peluquero de mascotas"],
    ["grooming table","mesa de peluquería"],
    ["hygiene","higiene"],
    ["kiosk","quiosco"],
    ["medical tools","herramientas médicas"],
    ["playpen","corral"],
    ["shelter","refugio"],
    ["species","especie"],
    ["stethoscope","estetoscopio"],
    ["supplies","suministros"],
    ["tablet","tableta"],
    ["vet","veterinario"],
  ],
  adverbs: [
    ["adjustable","ajustable"],
    ["attentive","atento"],
    ["carefully","con cuidado"],
    ["cautiously","cautelosamente"],
    ["digital","digital"],
    ["domesticated","domesticado"],
    ["efficiently","eficientemente"],
    ["healthily","saludablemente"],
    ["neatly","ordenadamente"],
    ["overhead","por encima / aéreo"],
    ["playful","juguetón"],
    ["professional","profesional"],
    ["spacious","espacioso"],
    ["sterile","estéril"],
    ["vibrant","vibrante"],
  ]
};

const icons = { verbs: "🔊", nouns: "🔊", adverbs: "🔊" };
const labels = { verbs: "Verbs", nouns: "Nouns", adverbs: "Adjectives & Adverbs" };

let currentUtterance = null;
let playQueue = [];
let playIndex = 0;
let isPlaying = false;

function getSpeed() {
  return parseFloat(document.getElementById('speedSelect').value);
}

function speakUtterance(text, lang) {
  return new Promise(resolve => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang;
    utter.rate = getSpeed();
    currentUtterance = utter;
    utter.onend = resolve;
    utter.onerror = resolve;
    window.speechSynthesis.speak(utter);
  });
}

async function speak(enText, esText, cardEl) {
  window.speechSynthesis.cancel();
  if (cardEl) cardEl.classList.add('playing');
  await speakUtterance(enText, 'en-US');
  if (!isPlaying && cardEl) { cardEl.classList.remove('playing'); return; }
  await new Promise(r => setTimeout(r, 180));
  // clean Spanish text (remove slashes, take first option)
  const esClean = esText.split('/')[0].trim();
  await speakUtterance(esClean, 'es-ES');
  if (cardEl) cardEl.classList.remove('playing');
}

function cardSpeak(enText, esText, cardEl) {
  stopAll();
  isPlaying = true;
  speak(enText, esText, cardEl).then(() => { isPlaying = false; });
}

function buildGrid(cat) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const cats = cat === 'all' ? ['verbs','nouns','adverbs'] : [cat];

  cats.forEach(c => {
    const lbl = document.createElement('div');
    lbl.className = `section-label label-${c}`;
    lbl.textContent = labels[c];
    grid.appendChild(lbl);

    vocab[c].forEach(([en, es]) => {
      const card = document.createElement('div');
      card.className = `card cat-${c}`;
      card.dataset.en = en;
      card.dataset.es = es;
      card.innerHTML = `
        <span class="card-icon">🔊</span>
        <div class="card-en">${en}</div>
        <div class="card-es">${es}</div>
      `;
      card.onclick = () => cardSpeak(en, es, card);
      grid.appendChild(card);
    });
  });
}

function filterCat(cat, btn) {
  stopAll();
  document.querySelectorAll('.tab').forEach(t => {
    t.className = 'tab';
  });
  btn.className = `tab active-${cat}`;
  buildGrid(cat);
}

async function playAll() {
  stopAll();
  isPlaying = true;
  document.getElementById('btnPlayAll').style.display = 'none';
  document.getElementById('btnStop').style.display = '';

  const cards = Array.from(document.querySelectorAll('.card'));
  for (let i = 0; i < cards.length; i++) {
    if (!isPlaying) break;
    const card = cards[i];
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    await speak(card.dataset.en, card.dataset.es, card);
    await new Promise(r => setTimeout(r, 250));
  }

  stopAll();
}

function stopAll() {
  isPlaying = false;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.card.playing').forEach(c => c.classList.remove('playing'));
  document.getElementById('btnPlayAll').style.display = '';
  document.getElementById('btnStop').style.display = 'none';
}

buildGrid('all');
</script>
</body>
</html>
